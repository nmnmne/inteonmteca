<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Language" content="ru">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>inteonmteca</title>
  <meta name="description" content="inteonmteca music label.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="topline matrix-text">от всех наших</p>

      <div class="logo-wrap" role="button" tabindex="0" aria-label="Запустить хаос логотипа">
        <img src="assets/logo.jpg?v=20260430-172928" alt="inteonmteca logo">
        <div class="logo-particles" id="logo-particles" aria-hidden="true"></div>
        <span class="logo-matrix" id="logo-matrix" aria-hidden="true">inteonmteca</span>
      </div>

      <p class="label matrix-text">music label</p>
      <p class="text matrix-text">Музыка, люди, вайб. Уже здесь</p>
      <div class="release">
        <img
          class="release-cover"
          id="release-cover"
          src="assets/wave-phonk/cover.png?v=20260430-172928"
          alt="Матт - Wave Phonk cover"
        >
        <div>
          <p class="release-date matrix-text">релиз 9 мая</p>
          <p class="release-title matrix-text">Матт - Wave Phonk</p>
        </div>
      </div>
      <div class="presave" aria-label="Ссылки на пресейв">
        <p class="presave-title">Добавить альбом в медиатеку в день релиза</p>
        <div class="presave-links">
          <a href="https://band.link/KMG3Q" target="_blank" rel="noopener noreferrer">
            <span class="presave-icon" style="width: 24px; height: 24px; flex: 0 0 24px;">
              <img src="assets/icons/yandex-music.png?v=20260430-172928" width="24" height="24" style="width: 24px; height: 24px; max-width: 24px; max-height: 24px;" alt="">
            </span>
            <span class="matrix-text">Яндекс Музыка</span>
          </a>
          <a href="https://band.link/KMG3Q" target="_blank" rel="noopener noreferrer">
            <span class="presave-icon" style="width: 24px; height: 24px; flex: 0 0 24px;">
              <img src="assets/icons/vk.png?v=20260430-172928" width="24" height="24" style="width: 24px; height: 24px; max-width: 24px; max-height: 24px;" alt="">
            </span>
            <span class="matrix-text">VK Музыка</span>
          </a>
          <a href="https://band.link/KMG3Q" target="_blank" rel="noopener noreferrer">
            <span class="presave-icon" style="width: 24px; height: 24px; flex: 0 0 24px;">
              <img src="assets/icons/spotify.png?v=20260430-172928" width="24" height="24" style="width: 24px; height: 24px; max-width: 24px; max-height: 24px;" alt="">
            </span>
            <span class="matrix-text">Spotify</span>
          </a>
          <a href="https://band.link/KMG3Q" target="_blank" rel="noopener noreferrer">
            <span class="presave-icon" style="width: 24px; height: 24px; flex: 0 0 24px;">
              <img src="assets/icons/apple-music.png?v=20260430-172928" width="24" height="24" style="width: 24px; height: 24px; max-width: 24px; max-height: 24px;" alt="">
            </span>
            <span class="matrix-text">Apple Music</span>
          </a>
        </div>
      </div>
      <p class="ours matrix-text">from all ours</p>

      <p class="now-playing matrix-text" id="now-playing">запускаем случайный трек</p>
    </section>
  </main>

  <button class="player-button" type="button" id="play-random" aria-label="Включить альбом">
    <span class="play-icon">▶</span>
  </button>

  <div class="transport-controls" aria-label="Управление треком">
    <button class="transport-button" type="button" id="previous-track" aria-label="Предыдущий трек">◀◀</button>
    <button class="transport-button" type="button" id="next-track" aria-label="Следующий трек">▶▶</button>
  </div>

  <audio
    id="album-player"
    class="native-player"
    preload="auto"
    playsinline
    controls
    controlsList="noplaybackrate"
  ></audio>
  <div class="cover-preview" id="cover-preview" aria-hidden="true">
    <img src="assets/wave-phonk/cover.png?v=20260430-172928" alt="Матт - Wave Phonk cover full size">
  </div>
  <div class="visit-counter" aria-label="site visits">
    <span>u:<b id="unique-count">--</b></span>
    <span>v:<b id="visit-count">--</b></span>
  </div>
  <script src="script.js"></script>
</body>
</html>
